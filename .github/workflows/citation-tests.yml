name: Citation checks

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  citation-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run citation checks
        run: npm run check
